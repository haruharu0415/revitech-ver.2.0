<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css}">
    
    <style th:replace="~{header :: header-styles}"></style>
    
    <title>オプション</title>
    
    <style>
        .btn-back-home {
            border-radius: 50px; /* 丸みをつける */
            padding: 12px 40px;  /* 横幅を広めに */
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease; /* アニメーションの設定 */
            background-color: #fff;
            border: 2px solid #6c757d;
            color: #6c757d;
        }
        
        .btn-back-home:hover {
            transform: translateY(-3px); /* 少し上に浮く */
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); /* 影を落とす */
            background-color: #6c757d;
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>
<body class="bg-light">

   <div th:replace="~{header :: header-fragment}"></div>

   <div class="container py-5">
        
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6" style="max-width: 500px;">
                
                <div class="card shadow-sm border-0 mb-5"> <div class="card-body p-5 text-center">
                        
                        <div class="mb-4">
                            <img th:if="${user != null}"
                                 th:src="${iconUrl != null ? iconUrl : '/images/icons/haru.png'}" 
                                 alt="ユーザーアイコン"
                                 class="rounded-circle border"
                                 style="width: 120px; height: 120px; object-fit: cover;">
                            
                            <div th:unless="${user != null}" class="rounded-circle bg-secondary d-flex align-items-center justify-content-center mx-auto" style="width: 120px; height: 120px;">
                                <i class="bi bi-person-fill text-white display-4"></i>
                            </div>
                        </div>

                        <div sec:authorize="isAuthenticated()">
                            <h3 class="fw-bold mb-1" th:text="${user != null ? user.name : 'ゲスト'}">ユーザー名</h3>
                            <p class="text-muted mb-4" th:text="${user != null ? user.email : ''}">email@example.com</p>
                            
                            <div class="d-grid gap-3 col-10 mx-auto">
                                <a th:href="@{/profile/edit}" class="btn btn-outline-primary">
                                    <i class="bi bi-pencil-fill me-2"></i> プロフィールを編集
                                </a>

                                <a th:if="${user.role == 2 || user.role == 3}" 
                                   th:href="@{/question/create}" 
                                   class="btn btn-outline-success">
                                    <i class="bi bi-clipboard-plus me-2"></i> アンケート作成
                                </a>

                                <form th:action="@{/logout}" method="post">
                                    <button type="submit" class="btn btn-outline-danger w-100">
                                        <i class="bi bi-box-arrow-right me-2"></i> ログアウト
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div sec:authorize="isAnonymous()">
                            <p class="text-muted mb-4">現在ログインしていません</p>
                            <a th:href="@{/login}" class="btn btn-primary px-5">ログイン</a>
                        </div>

                    </div>
                    
                    <div class="card-footer bg-white border-0 text-center py-3">
                         <a th:href="@{/terms}" class="btn btn-outline-secondary btn-sm w-75">
                            <i class="bi bi-file-text me-1"></i> 利用規約
                         </a>
                    </div>
                </div>

                <div class="text-center">
                     <a th:href="@{/home}" class="btn-back-home text-decoration-none">
                        <i class="bi bi-house-door-fill me-2"></i>ホームに戻る
                     </a>
                </div>

            </div>
        </div>
   </div>
    
   <script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
